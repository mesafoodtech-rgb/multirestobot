# Proyecto multirestobot (no confundir con el repo / despliegue restobot).
# En el mismo servidor que restobot, estos puertos evitan choque con 3001 y 5173.
name: multirestobot

services:
  # Código del bot está en la imagen (no hay bind mount de ./). Tras cambiar index.js/database.js:
  # docker compose build multirestobot && docker compose up -d multirestobot
  multirestobot:
    build: .
    container_name: multirestobot-whatsapp
    restart: always
    env_file:
      - .env
    ports:
      - "3011:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./tmp_audio:/app/tmp_audio

  dashboard:
    build: ./dashboard
    container_name: multirestobot-dashboard
    restart: always
    depends_on:
      - multirestobot
    environment:
      # El browser llama :5183/api/…; Vite reenvía al servicio del bot (puerto interno 3000).
      VITE_DEV_API_PROXY_TARGET: http://multirestobot:3000
    ports:
      - "5183:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - ./.env:/app/.env:ro
